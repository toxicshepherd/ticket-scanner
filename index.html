<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ticket-Check-in</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
      body { font-family: sans-serif; margin: 0; text-align: center; background: #fafafa; }
      h1 { font-size: 1.2em; padding: 12px 0 0; margin: 0; }
      #reader { width: 100%; max-width: 500px; margin: 12px auto; }
      #result { padding: 20px 16px; min-height: 110px; }
      #result .big  { font-size: 1.5em; font-weight: bold; }
      #result .name { font-size: 1.3em; margin-top: 6px; }
      #result .sub  { font-size: 1em; margin-top: 4px; opacity: 0.85; }
      .ok        { background: #b7e1a1; }
      .duplicate { background: #ffd966; }
      .invalid   { background: #ea9999; }
      #stats { padding: 8px; font-size: 0.95em; color: #555; }
      button {
        font-size: 1.1em; padding: 12px 24px; margin: 12px;
        background: #4285f4; color: #fff; border: none; border-radius: 6px;
      }
      #setup { padding: 16px; }
      #setup input { width: 90%; font-size: 1em; padding: 8px; }
    </style>
  </head>
  <body>
    <h1>Ticket-Check-in</h1>

    <!-- Einmalige Einrichtung: Apps-Script-Web-App-URL hinterlegen -->
    <div id="setup" style="display:none">
      <p>Apps-Script-Web-App-URL (endet auf /exec):</p>
      <input id="apiInput" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
      <br /><button onclick="saveApi()">Speichern</button>
    </div>

    <div id="reader"></div>
    <div id="result"></div>
    <button id="again" style="display:none" onclick="restart()">Nächsten scannen</button>
    <div id="stats"></div>

    <script>
      const resultEl = document.getElementById('result');
      const statsEl = document.getElementById('stats');
      const againBtn = document.getElementById('again');
      const scanner = new Html5Qrcode('reader');

      // API-URL aus ?api=...-Parameter oder localStorage; sonst Eingabemaske
      let API_URL = new URLSearchParams(location.search).get('api')
        || localStorage.getItem('apiUrl') || '';

      function saveApi() {
        const v = document.getElementById('apiInput').value.trim();
        if (!/^https:\/\/script\.google\.com\/.+\/exec$/.test(v)) {
          alert('Bitte die vollständige /exec-URL einfügen.');
          return;
        }
        API_URL = v;
        localStorage.setItem('apiUrl', v);
        document.getElementById('setup').style.display = 'none';
        start();
      }

      function start() {
        scanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: 220 },
          onScan
        ).then(() => resultEl.textContent = 'Bereit zum Scannen')
         .catch(e => resultEl.textContent = 'Kamerafehler: ' + e);
      }

      function onScan(code) {
        scanner.pause();
        resultEl.className = '';
        resultEl.textContent = 'Prüfe…';
        // Content-Type text/plain vermeidet CORS-Preflight, den Apps Script
        // nicht beantwortet; redirect:'follow' folgt der /exec-Weiterleitung.
        fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: code,
          redirect: 'follow'
        })
          .then(r => r.json())
          .then(show)
          .catch(e => show({ status: 'error', message: e.message }));
      }

      function esc(s) {
        const d = document.createElement('div');
        d.textContent = s == null ? '' : String(s);
        return d.innerHTML;
      }

      function show(res) {
        if (res.status === 'ok') {
          resultEl.className = 'ok';
          resultEl.innerHTML =
            '<div class="big">✔ Eingecheckt (Ticket ' + esc(res.ticket) + ')</div>' +
            '<div class="name">' + esc(res.person) + '</div>' +
            (res.info ? '<div class="sub">' + esc(res.info) + '</div>' : '') +
            '<div class="sub">' + esc(res.time) + ' Uhr</div>';
        } else if (res.status === 'duplicate') {
          resultEl.className = 'duplicate';
          resultEl.innerHTML =
            '<div class="big">⚠ BEREITS EINGECHECKT</div>' +
            '<div class="name">' + esc(res.person) + '</div>' +
            (res.info ? '<div class="sub">' + esc(res.info) + '</div>' : '') +
            '<div class="sub">Ticket ' + esc(res.ticket) +
              ' · eingecheckt am ' + esc(res.time) + ' Uhr</div>';
        } else if (res.status === 'invalid') {
          resultEl.className = 'invalid';
          resultEl.innerHTML = '<div class="big">✘ Ungültiger Code</div>';
        } else {
          resultEl.className = 'invalid';
          resultEl.innerHTML = '<div class="big">Verbindungsfehler</div>' +
            '<div class="sub">' + esc(res.message || 'unbekannt') + '</div>';
        }
        if (res.sumTotal != null) {
          statsEl.textContent =
            'Eingecheckt gesamt: ' + res.sumChecked + ' von ' + res.sumTotal + ' Tickets';
        }
        againBtn.style.display = 'inline-block';
        if (navigator.vibrate) navigator.vibrate(res.status === 'ok' ? 100 : [80, 60, 80]);
      }

      function restart() {
        againBtn.style.display = 'none';
        resultEl.className = '';
        resultEl.textContent = 'Bereit zum Scannen';
        scanner.resume();
      }

      if (API_URL) {
        start();
      } else {
        document.getElementById('setup').style.display = 'block';
      }
    </script>
  </body>
</html>

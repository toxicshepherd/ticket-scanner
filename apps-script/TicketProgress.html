<!DOCTYPE html>
<html>
  <body style="font-family: sans-serif; margin: 16px;">
    <p id="label">Starte …</p>
    <div style="background:#eee; border-radius:6px; height:22px; overflow:hidden;">
      <div id="bar" style="background:#4285f4; height:100%; width:0%;
                           border-radius:6px; transition:width .4s;"></div>
    </div>
    <p id="count" style="color:#555;"></p>
    <p id="result"></p>
    <script>
      const label = document.getElementById('label');
      const bar = document.getElementById('bar');
      const count = document.getElementById('count');
      const result = document.getElementById('result');

      // Lädt das PDF stückweise vom Script und stößt den Browser-Download
      // an — ohne Aufruf von drive.google.com (an manchen PCs gesperrt)
      function downloadPdf(fileId, fallbackName) {
        const parts = [];
        function next(i) {
          google.script.run
            .withSuccessHandler(c => {
              parts.push(Uint8Array.from(atob(c.data), ch => ch.charCodeAt(0)));
              if (c.more) {
                count.textContent = 'Lade PDF … Teil ' + (i + 2);
                next(i + 1);
              } else {
                const name = c.name || fallbackName || 'Eintrittskarten.pdf';
                const url = URL.createObjectURL(
                  new Blob(parts, { type: 'application/pdf' }));
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                count.textContent = 'Download gestartet: ' + name;
                result.innerHTML = 'Falls nichts passiert: <a href="' + url +
                  '" download="' + name + '">hier klicken</a>';
              }
            })
            .withFailureHandler(e => {
              count.textContent = 'Fehler beim Laden: ' + e.message;
            })
            .getPdfChunk(fileId, i);
        }
        count.textContent = 'Lade PDF … Teil 1';
        next(0);
      }

      // Generierung starten; danach direkt den Download anstoßen
      google.script.run
        .withSuccessHandler(res => {
          clearInterval(timer);
          bar.style.width = '100%';
          label.textContent = 'Fertig: ' + res.count + ' Eintrittskarten erzeugt.';
          downloadPdf(res.fileId, res.name);
        })
        .withFailureHandler(err => {
          clearInterval(timer);
          label.textContent = 'Fehler: ' + err.message;
        })
        .generateTicketPdf();

      // Fortschritt alle 2 Sekunden abfragen
      const timer = setInterval(() => {
        google.script.run.withSuccessHandler(p => {
          if (!p) return;
          label.textContent = p.label;
          count.textContent = p.total ? p.done + ' von ' + p.total + ' Karten' : '';
          bar.style.width =
            (p.total ? Math.round(100 * p.done / p.total) : 0) + '%';
        }).getTicketProgress();
      }, 2000);
    </script>
  </body>
</html>

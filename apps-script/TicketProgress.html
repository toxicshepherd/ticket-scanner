<!DOCTYPE html>
<html>
  <body style="font-family: sans-serif; margin: 16px;">
    <p id="label">Starte …</p>
    <div style="background:#eee; border-radius:6px; height:22px; overflow:hidden;">
      <div id="bar" style="background:#4285f4; height:100%; width:0%;
                           border-radius:6px; transition:width .4s;"></div>
    </div>
    <p id="count" style="color:#555;"></p>
    <p id="result"></p>
    <script>
      const label = document.getElementById('label');
      const bar = document.getElementById('bar');
      const count = document.getElementById('count');
      const result = document.getElementById('result');

      // Generierung starten; Ergebnis-Link anzeigen, wenn fertig
      google.script.run
        .withSuccessHandler(res => {
          clearInterval(timer);
          bar.style.width = '100%';
          label.textContent = 'Fertig: ' + res.count + ' Eintrittskarten erzeugt.';
          count.textContent = '';
          result.innerHTML =
            '<a href="' + res.url + '" target="_blank">PDF in Google Drive öffnen</a>';
        })
        .withFailureHandler(err => {
          clearInterval(timer);
          label.textContent = 'Fehler: ' + err.message;
        })
        .generateTicketPdf();

      // Fortschritt alle 2 Sekunden abfragen
      const timer = setInterval(() => {
        google.script.run.withSuccessHandler(p => {
          if (!p) return;
          label.textContent = p.label;
          count.textContent = p.total ? p.done + ' von ' + p.total + ' Karten' : '';
          bar.style.width =
            (p.total ? Math.round(100 * p.done / p.total) : 0) + '%';
        }).getTicketProgress();
      }, 2000);
    </script>
  </body>
</html>
